// ---------- Helpers ----------

function parseNum(raw) {
  let s = String(raw).trim().toLowerCase();
  s = s.replace(/−/g, "-");
  s = s.replace(/^x\s*[12]?\s*=\s*/, "");
  s = s.replace(/\s+/g, "");
  s = s.replace(",", ".");
  if (s.includes("/")) {
    const parts = s.split("/");
    const n = parseFloat(parts[0]);
    const d = parseFloat(parts[1]);
    if (!isNaN(n) && !isNaN(d) && d !== 0) return n / d;
    return NaN;
  }
  return parseFloat(s);
}

function checkLinearAnswer(item, raw) {
  const s = String(raw).trim().toLowerCase();
  if (item.special === "todos") return /todos|cualquier|infinit/.test(s);
  if (item.special === "ninguna") return /no tiene|ningun|sin soluci|no hay|no existe/.test(s);
  const v = parseNum(raw);
  if (isNaN(v)) return false;
  return Math.abs(v - item.value) < 0.03;
}

function linearAnswerDisplay(item) {
  if (item.special === "todos") return "se cumple para todos los números reales (es una identidad)";
  if (item.special === "ninguna") return "no tiene solución (nunca se cumple)";
  return "x = " + item.display;
}

  const s = String(raw).trim().toLowerCase();
  if (item.special === "ninguna") return /no tiene|ningun|sin soluci|no hay|no real|no existe/.test(s);
  const parts = s.split(/[,;]+| y /).map((p) => p.trim()).filter(Boolean);
  const nums = parts.map(parseNum).filter((n) => !isNaN(n));
  const deduped = [];
  nums.forEach((n) => {
    if (!deduped.some((d) => Math.abs(d - n) < 0.05)) deduped.push(n);
  });
  if (deduped.length !== item.values.length) return false;
  const used = new Array(deduped.length).fill(false);
  for (const cv of item.values) {
    let found = -1;
    for (let i = 0; i < deduped.length; i++) {
      if (!used[i] && Math.abs(deduped[i] - cv) < 0.05) {
        found = i;
        break;
      }
    }
    if (found === -1) return false;
    used[found] = true;
  }
  return true;
}

function quadAnswerDisplay(item) {
  if (item.special === "ninguna") return "no tiene solución real";
  return item.display;
}

function labelFor(s) {
  const map = { N: "ℕ", Z: "ℤ", Q: "ℚ", I: "𝕀", R: "ℝ" };
  return map[s];
}

// ---------- Componentes de pregunta ----------

function MultipleChoice({ id, prompt, options, correctIndex, explanation, setResult }) {
  const [selected, setSelected] = useState(null);
  const [checked, setChecked] = useState(false);

  const handleSelect = (i) => { setSelected(i); setChecked(false); };
  const handleCheck = () => {
    if (selected === null) return;
    setChecked(true);
    setResult(id, selected === correctIndex);
  };

  return (
    <div className="q-card">
      <p className="q-prompt">{prompt}</p>
      <div className="options-list">
        {options.map((opt, i) => {
          let cls = "opt-default";
          if (checked) {
            if (i === correctIndex) cls = "opt-correct";
            else if (i === selected) cls = "opt-incorrect";
            else cls = "opt-dim";
          } else if (selected === i) {
            cls = "opt-selected";
          }
          return (
            <button key={i} className={"option-btn " + cls} onClick={() => handleSelect(i)}>
              {opt}
            </button>
          );
        })}
      </div>
      <div className="btn-row">
        <button className="btn-primary" onClick={handleCheck} disabled={selected === null}>
          ✓ Verificar
        </button>
        {checked && (
          <span className={"feedback " + (selected === correctIndex ? "feedback-ok" : "feedback-bad")}>
            {selected === correctIndex ? <IconCheck size={16} /> : <IconX size={16} />}
            {selected === correctIndex ? "¡Correcto!" : 'Correcta: "' + options[correctIndex] + '"'}
          </span>
        )}
      </div>
      {checked && explanation && <p className="explain-text">{explanation}</p>}
    </div>
  );
}

function SetClassification({ id, label, correctSets, setResult }) {
  const allSets = ["N", "Z", "Q", "I", "R"];
  const [selected, setSelected] = useState([]);
  const [checked, setChecked] = useState(false);

  const toggle = (s) => {
    setSelected((prev) => (prev.includes(s) ? prev.filter((x) => x !== s) : [...prev, s]));
    setChecked(false);
  };

  const handleCheck = () => {
    const ok = selected.length === correctSets.length && selected.every((s) => correctSets.includes(s));
    setChecked(true);
    setResult(id, ok);
  };

  const isOk = selected.length === correctSets.length && selected.every((s) => correctSets.includes(s));

  return (
    <div className="q-card">
      <div style={{ marginBottom: 12 }}>
        <span className="set-label">{label}</span>
      </div>
      <div className="toggle-row">
        {allSets.map((s) => {
          const active = selected.includes(s);
          let cls = active ? "tg-active" : "tg-off";
          if (checked) {
            const shouldBe = correctSets.includes(s);
            if (shouldBe && active) cls = "tg-correct-on";
            else if (shouldBe && !active) cls = "tg-correct-off";
            else if (!shouldBe && active) cls = "tg-wrong-on";
            else cls = "tg-dim";
          }
          return (
            <button key={s} className={"toggle-btn " + cls} onClick={() => toggle(s)}>
              {labelFor(s)}
            </button>
          );
        })}
      </div>
      <div className="btn-row">
        <button className="btn-primary" onClick={handleCheck} disabled={selected.length === 0}>
          ✓ Verificar
        </button>
        {checked && (
          <span className={"feedback " + (isOk ? "feedback-ok" : "feedback-bad")}>
            {isOk ? <IconCheck size={16} /> : <IconX size={16} />}
            {isOk ? "¡Correcto!" : "Pertenece a: " + correctSets.map(labelFor).join(", ")}
          </span>
        )}
      </div>
    </div>
  );
}

function NumericAnswer({ id, prompt, checkFn, answerDisplay, setResult }) {
  const [value, setValue] = useState("");
  const [checked, setChecked] = useState(false);
  const [isCorrect, setIsCorrect] = useState(false);

  const handleCheck = () => {
    const ok = checkFn(value);
    setIsCorrect(ok);
    setChecked(true);
    setResult(id, ok);
  };

  const cardCls = checked ? (isCorrect ? "ic-correct" : "ic-incorrect") : "ic-default";
  const inputCls = checked ? (isCorrect ? "ti-correct" : "ti-incorrect") : "";

  return (
    <div className={"input-card " + cardCls}>
      <p className="eq-prompt">{prompt}</p>
      <div className="input-row">
        <input
          value={value}
          onChange={(e) => setValue(e.target.value)}
          placeholder="x = ..."
          className={"text-input " + inputCls}
        />
        <button className="btn-primary" onClick={handleCheck} disabled={!value.trim()}>
          ✓ Verificar
        </button>
      </div>
      {checked && (
        <div className={"input-feedback " + (isCorrect ? "feedback-ok" : "feedback-bad")}>
          {isCorrect ? <IconCheck size={18} /> : <IconX size={18} />}
          <span>{isCorrect ? "¡Correcto!" : "No es correcto. Respuesta: " + answerDisplay}</span>
        </div>
      )}
    </div>
  );
}

function ExerciseBlock({ number, emoji, title, subtitle, defaultOpen, children }) {
  const [open, setOpen] = useState(!!defaultOpen);
  return (
    <div className="exercise-block">
      <button className="exercise-header" onClick={() => setOpen(!open)}>
        <span className="exercise-number">{number}</span>
        <div className="exercise-title-wrap">
          <h3 className="exercise-title">{emoji ? emoji + " " : ""}{title}</h3>
          {subtitle && <p className="exercise-subtitle">{subtitle}</p>}
        </div>
        {open ? <IconChevronUp size={20} /> : <IconChevronDown size={20} />}
      </button>
      {open && <div className="exercise-body">{children}</div>}
    </div>
  );
}

function StatPill({ big, label }) {
  return (
    <div className="stat-pill">
      <p className="stat-big">{big}</p>
      <p className="stat-label">{label}</p>
    </div>
  );
}

function ScoreBar({ correctCount, answered, total, onReset }) {
  const pct = total ? Math.round((correctCount / total) * 100) : 0;
  const points = correctCount * 10;
  return (
    <div className="score-card">
      <div className="score-left">
        <span className="lightning">⚡</span>
        <div>
          <p className="score-points">{points} pts</p>
          <p className="score-sub">{correctCount} / {total} correctas · {answered} respondidas</p>
        </div>
      </div>
      <div className="progress-wrap">
        <div className="progress-track">
          <div className="progress-fill" style={{ width: pct + "%" }} />
        </div>
        <span className="progress-pct">{pct}%</span>
      </div>
      <button className="btn-reset" onClick={onReset}>
        <IconRotate size={14} /> ↩ Reiniciar
      </button>
    </div>
  );
}

function Tabs({ tab, setTab }) {
  return (
    <div className="tabs-row">
      <button className={"tab-btn " + (tab === "tp2" ? "tab-active" : "tab-inactive")} onClick={() => setTab("tp2")}>
        📘 TP N°2 — Números y operaciones
      </button>
      <button className={"tab-btn " + (tab === "tp3" ? "tab-active" : "tab-inactive")} onClick={() => setTab("tp3")}>
        📗 TP N°3 — Ecuaciones
      </button>
    </div>
  );
}

function TP2({ setResult }) {
  return (
    <div>
      <ExerciseBlock number="1" emoji="🔢" title="Conjuntos numéricos" defaultOpen>
        <div className="story-card">
          <p className="story-text">
            Imaginá que estás en un taller. No usás un martillo para apretar un tornillo, ni una pinza para medir un cable: en matemática pasa lo mismo, usamos diferentes "familias" de números según lo que necesitemos modelar en la realidad.
          </p>
          <ul className="story-list">
            <li>🔩 Si contamos piezas de un motor, usamos <strong>Naturales</strong> (1, 2, 3...).</li>
            <li>🌡️ Si medimos temperaturas bajo cero o deudas, necesitamos los <strong>Enteros</strong> (−3, −10...).</li>
            <li>🔌 Si cortamos un cable a la mitad o hablamos de voltaje, usamos fracciones y decimales exactos: los <strong>Racionales</strong>.</li>
            <li>⚙️ Si calculamos piezas circulares o curvas muy complejas, aparecen decimales infinitos y caóticos: los <strong>Irracionales</strong> (como π).</li>
          </ul>
          <p className="story-text">Todos ellos juntos forman el gran taller de los números <strong>Reales</strong>.</p>
          <div className="story-callout">
            <p className="mission-label">🧰 Tu misión</p>
            <p className="story-text" style={{ marginTop: 6, marginBottom: 0 }}>Vamos a organizar nuestro inventario. Tenés la siguiente lista de números: tu tarea es ubicarlos en su "caja" correspondiente, marcando a qué conjunto pertenece cada uno.</p>
          </div>
        </div>
        {clasifItems.map((item) => (
          <SetClassification key={item.id} id={item.id} label={item.label} correctSets={item.sets} setResult={setResult} />
        ))}
      </ExerciseBlock>

      <ExerciseBlock number="6" emoji="✅" title="¿Verdadero o falso?" subtitle="Elegí una opción y verificá">
        {vfItems.map((item) => (
          <MultipleChoice key={item.id} id={item.id} prompt={item.prompt} options={["Verdadero", "Falso"]} correctIndex={item.correct ? 0 : 1} explanation={item.explain} setResult={setResult} />
        ))}
      </ExerciseBlock>

      <ExerciseBlock number="7" emoji="📏" title="Tipos de intervalo" subtitle="Identificá el tipo de cada intervalo">
        {intervalItems.map((item) => (
          <MultipleChoice key={item.id} id={item.id} prompt={item.prompt} options={item.options} correctIndex={item.correct} setResult={setResult} />
        ))}
      </ExerciseBlock>

      <ExerciseBlock number="8" emoji="🔬" title="Notación científica" subtitle="Elegí la expresión correcta">
        {notacionItems.map((item) => (
          <MultipleChoice key={item.id} id={item.id} prompt={item.prompt} options={item.options} correctIndex={item.correct} setResult={setResult} />
        ))}
      </ExerciseBlock>
    </div>
  );
}

function TP3({ setResult }) {
  return (
    <div>
      <ExerciseBlock number="1" emoji="🔤" title="Términos semejantes" defaultOpen>
        <div className="story-card">
          <p className="story-text">
            El álgebra suele asustar porque pone letras donde solía haber números. Pero, en realidad, se inventó para ahorrar tiempo y escribir menos: es como usar abreviaturas o hacer un resumen.
          </p>
          <p className="story-text">
            Imaginá que estás a cargo del inventario de un depósito. Alguien te da un reporte súper confuso que dice: "Llegaron 5 cajas de tornillos, luego se llevaron 8 cajas de tornillos, y al final alguien trajo 2 cajas de tornillos".
          </p>
          <p className="story-text">
            En lugar de leer toda esa frase cada vez, la traducimos a un "idioma" más corto. Llamemos <em>x</em> a las "cajas de tornillos". La frase se traduce así:
          </p>
          <p className="equation-box">5x − 8x + 2x</p>
          <p className="story-text">
            ¿Ves? La letra <em>x</em> es solo un objeto. Y la operación de "reducir términos semejantes" no es más que limpiar tu escritorio de trabajo: si todos los términos hablan de lo mismo (cajas de tornillos), simplemente los agrupamos para saber el total.
          </p>
          <div className="story-callout">
            <p className="mission-label">🧰 Tu misión</p>
            <p className="story-text" style={{ marginTop: 6 }}>Resolvé esa pequeña línea de inventario:</p>
            <p className="equation-box">5x − 8x + 2x</p>
            <p className="mission-label" style={{ marginTop: 12 }}>Pasos para resolverlo:</p>
            <ol className="steps-list">
              <li>Pensá en la x como un objeto físico (cables, tornillos, horas de trabajo).</li>
              <li>Hacé la cuenta solo con los números (tenés 5, te quitan 8, sumás 2).</li>
              <li>Escribí el resultado final acompañando al objeto (x). ¿Cuántas "cajas" te quedaron a favor o en contra?</li>
            </ol>
          </div>
          <p className="story-text" style={{ marginBottom: 0 }}>
            ¡Y listo! Acabás de reducir una expresión algebraica: estás traduciendo un problema desordenado a una versión mucho más simple y lista para ser resuelta.
          </p>
        </div>
        {terminosItems.map((item) => (
          <MultipleChoice key={item.id} id={item.id} prompt={item.expr} options={item.options} correctIndex={item.correct} setResult={setResult} />
        ))}
      </ExerciseBlock>

      <ExerciseBlock number="2" emoji="➗" title="Ecuaciones lineales" subtitle="Resolvé y escribí el valor de x (fracciones tipo 7/2 o decimales con punto o coma)">
        {linearItems.map((item) => (
          <NumericAnswer key={item.id} id={item.id} prompt={item.eq} checkFn={(v) => checkLinearAnswer(item, v)} answerDisplay={linearAnswerDisplay(item)} setResult={setResult} />
        ))}
      </ExerciseBlock>

      <ExerciseBlock number="3" emoji="🔧" title="Despejar la incógnita indicada">
        {despejarItems.map((item) => (
          <MultipleChoice key={item.id} id={item.id} prompt={item.prompt} options={item.options} correctIndex={item.correct} setResult={setResult} />
        ))}
      </ExerciseBlock>

      <ExerciseBlock number="4" emoji="📈" title="Ecuaciones cuadráticas" subtitle="Si hay dos soluciones, separalas con una coma. Si no tiene solución real, escribí 'no tiene solución'.">
        {quadItems.map((item) => (
          <NumericAnswer key={item.id} id={item.id} prompt={item.eq} checkFn={(v) => checkQuadAnswer(item, v)} answerDisplay={quadAnswerDisplay(item)} setResult={setResult} />
        ))}
      </ExerciseBlock>
    </div>
  );
}

const TOTAL = clasifItems.length + vfItems.length + intervalItems.length + notacionItems.length + terminosItems.length + linearItems.length + despejarItems.length + quadItems.length;

  const [results, setResults] = useState({});

  return (
    <div className="page">
      <div className="container">

            <StatPill big={TOTAL} label="Ejercicios" />

          <div className="footer-card">

            <div>
              <a href="mailto:matematica@inspt.utn.edu.ar" className="footer-email">matematica@inspt.utn.edu.ar</a>
              <p className="footer-cat">Cátedra de Matemática — UTN INSPT · Ingresantes</p>
            </div>
          </div>
          <p className="footer-bottom">UTN INSPT · Matemática para Ingresantes.</p>
        </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
